<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Admin</title>
</head>
<body style="background:#0f1a0f; color:white; text-align:center; font-family:Arial; padding-top:100px;">

<h2>LOGIN ADMIN (silahkan masukan password dengan benar)</h2>

<input type="password" id="pass" placeholder="Masukkan Password">
<br><br>
<button onclick="login()">Masuk</button>

<p id="error" style="color:red;"></p>

<script>
const PASSWORD = "rabekaojokendor2026"; // 🔥 GANTI PASSWORD DISINI

function login() {
  const input = document.getElementById("pass").value;

  if (input === PASSWORD) {
    localStorage.setItem("auth", "true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText =
      "Password salah!";
  }
}
</script>

</body>
</html>
