<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>COMMAND CENTER - HQ DASHBOARD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #050a05; color: #00ff00; overflow: hidden; }
        
        .header {
            background: #0a1a0a; padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid #00ff00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .container { display: grid; grid-template-columns: 300px 1fr 300px; height: calc(100vh - 65px); }
        
        .panel { background: rgba(10, 25, 10, 0.95); padding: 20px; border-right: 1px solid #00ff00; overflow-y: auto; }
        .panel-right { border-right: none; border-left: 1px solid #00ff00; }

        #map { background: #000; height: 100%; }

        .stat-card {
            background: #000; border: 1px solid #00ff00; padding: 15px; margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .unit-item {
            padding: 12px; border-bottom: 1px solid rgba(0, 255, 0, 0.2); cursor: pointer; transition: 0.2s;
        }

        .unit-item:hover { background: rgba(0, 255, 0, 0.1); }
        .online { color: #00ff88; font-weight: bold; }
        .offline { color: #ff3333; }

        /* Custom Marker CSS */
        .marker-pulse {
            width: 15px; height: 15px; background: #00ff00; border: 2px solid white;
            border-radius: 50%; box-shadow: 0 0 15px #00ff00;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .logout-btn {
            background: #440000; color: white; border: 1px solid red;
            padding: 8px 15px; cursor: pointer; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 20px;">🛰 COMMAND CENTER <span style="font-size: 12px; color: #888;">v2.0 HD</span></div>
    <button class="logout-btn" onclick="logout()">TERMINATE SESSION</button>
</div>

<div class="container">
    <div class="panel">
        <div class="stat-card">
            <div style="font-size: 10px;">TOTAL ASSETS</div>
            <div id="totalUnit" style="font-size: 24px;">0</div>
        </div>
        <div class="stat-card" style="border-color: #00ff88;">
            <div style="font-size: 10px;">ACTIVE UNITS</div>
            <div id="onlineUnit" style="font-size: 24px; color: #00ff88;">0</div>
        </div>
        
        <h3>UNIT LIST</h3>
        <input type="text" id="search" placeholder="FILTER CALLSIGN..." style="width:100%; padding:8px; background:#000; border:1px solid #00ff00; color:#00ff00; font-family:'Orbitron';">
        <div id="listUnit" style="margin-top:15px;"></div>
    </div>

    <div id="map"></div>

    <div class="panel panel-right">
        <h3>UNIT TELEMETRY</h3>
        <div id="detailBox" style="font-size: 13px; line-height: 2;">
            SELECT UNIT TO VIEW DATA
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Setup Map with Dark Mode
    const map = L.map("map").setView([-2, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
    }).addTo(map);

    let markers = {};
    let paths = {};

    onValue(ref(db, "live"), snap => {
        const data = snap.val();
        if(!data) return;

        const list = document.getElementById("listUnit");
        list.innerHTML = "";
        let count = 0, online = 0;

        Object.keys(data).forEach(nama => {
            const unit = data[nama];
            const isOnline = (Date.now() - unit.waktu) < 30000;
            count++; if(isOnline) online++;

            // Update/Create Marker
            if(!markers[nama]) {
                const customIcon = L.divIcon({ className: 'custom-m', html: '<div class="marker-pulse"></div>' });
                markers[nama] = L.marker([unit.latitude, unit.longitude], {icon: customIcon}).addTo(map);
                paths[nama] = L.polyline([], {color: '#00ff00', weight: 2, opacity: 0.5}).addTo(map);
            }
            
            markers[nama].setLatLng([unit.latitude, unit.longitude]);
            paths[nama].addLatLng([unit.latitude, unit.longitude]);

            // Unit List Item
            const item = document.createElement("div");
            item.className = "unit-item";
            item.innerHTML = `<strong>${nama}</strong> <span style="float:right" class="${isOnline?'online':'offline'}">${isOnline?'ACTIVE':'LOST'}</span>`;
            item.onclick = () => {
                map.flyTo([unit.latitude, unit.longitude], 16);
                document.getElementById("detailBox").innerHTML = `
                    <b>CALLSIGN:</b> ${nama}<br>
                    <b>STATUS:</b> ${isOnline?'ACTIVE':'SIGNAL LOST'}<br>
                    <b>COORD:</b> ${unit.latitude.toFixed(5)}, ${unit.longitude.toFixed(5)}<br>
                    <b>SPEED:</b> ${unit.speed} KM/H<br>
                    <b>ACCURACY:</b> ${unit.accuracy} M<br>
                    <b>LAST CONTACT:</b> ${new Date(unit.waktu).toLocaleTimeString()}
                `;
            };
            list.appendChild(item);
        });

        document.getElementById("totalUnit").innerText = count;
        document.getElementById("onlineUnit").innerText = online;
    });

    window.logout = () => { localStorage.removeItem("auth"); window.location.href="login.html"; };
</script>
</body>
</html>
