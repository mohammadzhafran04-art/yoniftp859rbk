<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT MONITORING - TACTICAL HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #000800;
            --glass-bg: rgba(5, 15, 5, 0.9);
            --danger: #ff0033;
        }

        body { 
            margin: 0; font-family: 'Orbitron', sans-serif; 
            background: var(--dark-bg); color: var(--neon-green); 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* Scanline CRT Effect */
        body::before { 
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none; 
        }

        /* Animated Radar Pulse */
        .radar-circles {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vmax; height: 100vmax; z-index: 1; pointer-events: none;
        }
        .circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 0, 0.1); border-radius: 50%;
            animation: radar-sweep 4s infinite linear;
        }

        @keyframes radar-sweep {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 100%; height: 100%; opacity: 0; }
        }

        .header { 
            background: #021202; padding: 15px; text-align: center; 
            border-bottom: 2px solid var(--neon-green); font-weight: bold; 
            letter-spacing: 4px; z-index: 50; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3);
        }

        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; padding: 20px; }

        /* Compass Visualizer */
        #compass {
            width: 120px; height: 120px; border: 2px solid var(--neon-green);
            border-radius: 50%; margin-bottom: 20px; position: relative;
            transition: transform 0.1s ease-out; box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #compass::after {
            content: "N"; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            font-size: 10px; font-weight: bold;
        }
        .needle {
            position: absolute; top: 50%; left: 50%; width: 2px; height: 50px;
            background: var(--danger); transform-origin: bottom; transform: translate(-50%, -100%);
        }

        .card { 
            background: var(--glass-bg); padding: 25px; width: 100%; max-width: 340px; 
            border: 1px solid var(--neon-green); border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1); backdrop-filter: blur(10px);
        }

        input { 
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.9); 
            border: 1px solid var(--neon-green); color: var(--neon-green); 
            font-family: 'JetBrains Mono'; margin-bottom: 15px; 
            box-sizing: border-box; outline: none; text-align: center; border-radius: 0;
        }

        button { 
            width: 100%; padding: 18px; background: var(--neon-green); color: #000; 
            border: none; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron'; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button:disabled { background: #004400; color: var(--neon-green); box-shadow: none; cursor: default; }

        .telemetry { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            margin-top: 20px; font-family: 'JetBrains Mono';
        }

        .tel-box {
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 2px;
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .tel-label { font-size: 8px; color: #888; display: block; margin-bottom: 4px; }
        .tel-val { font-size: 14px; font-weight: bold; color: #fff; }

        #status-bar {
            width: 100%; max-width: 340px; display: flex; justify-content: space-between;
            font-size: 10px; margin-top: 15px; font-family: 'JetBrains Mono';
        }

        .active-glow { animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 5px var(--neon-green); } 50% { text-shadow: 0 0 15px var(--neon-green); } }

        .footer-info {
            background: #021202; width: 100%; padding: 10px; text-align: center;
            font-size: 9px; color: rgba(0,255,0,0.5); border-top: 1px solid var(--neon-green);
        }
    </style>
</head>
<body>

<div class="radar-circles">
    <div class="circle" style="animation-delay: 0s"></div>
    <div class="circle" style="animation-delay: 1s"></div>
    <div class="circle" style="animation-delay: 2s"></div>
</div>

<div class="header">Yonif 859 // Tactical Uplink</div>

<div class="container">
    <div id="compass">
        <div class="needle"></div>
    </div>

    <div class="card" id="mainCard">
        <input type="text" id="nama" placeholder="CALLSIGN / UNIT NAME" maxlength="15">
        <button id="btnTrack">Initiate Link</button>
        
        <div class="telemetry">
            <div class="tel-box">
                <span class="tel-label">LATITUDE</span>
                <span class="tel-val" id="lat">0.00000</span>
            </div>
            <div class="tel-box">
                <span class="tel-label">LONGITUDE</span>
                <span class="tel-val" id="lon">0.00000</span>
            </div>
            <div class="tel-box">
                <span class="tel-label">SPEED</span>
                <span class="tel-val"><span id="spd">0</span> KM/H</span>
            </div>
            <div class="tel-box">
                <span class="tel-label">ACCURACY</span>
                <span class="tel-val"><span id="acc">0</span> M</span>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <span id="pwr">BATT: --%</span>
        <span id="msg" class="active-glow">SYSTEM STANDBY</span>
        <span id="time">00:00:00</span>
    </div>
</div>

<div class="footer-info">SECURE CHANNEL // AES-256 BIT ENCRYPTION // NO LOG RETAIN</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btn = document.getElementById("btnTrack");
    const compass = document.getElementById("compass");

    // Clock
    setInterval(() => {
        document.getElementById("time").innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    // Battery
    if (navigator.getBattery) {
        navigator.getBattery().then(bat => {
            const updateBat = () => document.getElementById("pwr").innerText = `BATT: ${Math.round(bat.level * 100)}%`;
            updateBat();
            bat.onlevelchange = updateBat;
        });
    }

    // Compass / Device Orientation
    window.addEventListener("deviceorientation", (e) => {
        if (e.webkitCompassHeading) { // iOS
            compass.style.transform = `rotate(${-e.webkitCompassHeading}deg)`;
        } else { // Android
            compass.style.transform = `rotate(${-e.alpha}deg)`;
        }
    });

    btn.onclick = async function() {
        const nama = document.getElementById("nama").value.trim().toUpperCase();
        if(!nama) return;

        btn.disabled = true;
        btn.innerText = "UPLINK ACTIVE";
        document.getElementById("msg").innerText = "TRANSMITTING...";
        
        // WakeLock
        if ("wakeLock" in navigator) {
            try { await navigator.wakeLock.request("screen"); } catch (err) {}
        }

        navigator.geolocation.watchPosition((pos) => {
            const updates = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                speed: Math.round((pos.coords.speed || 0) * 3.6),
                accuracy: Math.round(pos.coords.accuracy),
                waktu: Date.now(),
                status: "ONLINE"
            };

            set(ref(db, "live/" + nama), updates);
            onDisconnect(ref(db, "live/" + nama + "/status")).set("OFFLINE");

            document.getElementById("lat").innerText = updates.latitude.toFixed(5);
            document.getElementById("lon").innerText = updates.longitude.toFixed(5);
            document.getElementById("spd").innerText = updates.speed;
            document.getElementById("acc").innerText = updates.accuracy;
        }, null, { enableHighAccuracy: true });
    };
</script>
</body>
</html>
