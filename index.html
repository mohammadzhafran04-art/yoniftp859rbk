<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Monitoring Satuan</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background-color: #0f1a0f;
  color: #e0e0e0;
}

.header {
  background-color: #1b2b1b;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
  border-bottom: 2px solid #3a5f3a;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 85vh;
}

.card {
  background: #182618;
  padding: 30px;
  border-radius: 10px;
  width: 350px;
  box-shadow: 0 0 25px rgba(0,255,0,0.15);
  border: 1px solid #3a5f3a;
}

h2 {
  text-align: center;
  color: #7CFC00;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  background: #101a10;
  border: 1px solid #3a5f3a;
  color: #7CFC00;
  border-radius: 6px;
  margin-bottom: 15px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2e5e2e;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#status {
  margin-top: 15px;
  font-weight: bold;
  color: #7CFC00;
  text-align: center;
  font-size: 14px;
}

.online-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: lime;
  border-radius: 50%;
  margin-left: 5px;
  box-shadow: 0 0 10px lime;
}

.footer {
  text-align: center;
  font-size: 12px;
  padding: 10px;
  color: #888;
}
</style>
</head>

<body>

<div class="header">
  SISTEM MONITORING LOKASI SATUAN YON TP 859/RBK
</div>

<div class="container">
  <div class="card">
    <h2>TRACKING ANGGOTA</h2>

    <input type="text" id="nama" placeholder="Masukkan Nama / Panggilan">
    <button onclick="mulaiTracking()">AKTIFKAN TRACKING</button>

    <div id="status"></div>
  </div>
</div>

<div class="footer">
  Internal Use Only - Secure Tracking System
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwRrHaHepQtAGLj9JrC3vlJG37o3j9CPY",
  authDomain: "real-time-location-30d91.firebaseapp.com",
  databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "real-time-location-30d91",
  storageBucket: "real-time-location-30d91.firebasestorage.app",
  messagingSenderId: "1092565406651",
  appId: "1:1092565406651:web:5895c20a8c7169cb7b6a9e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.mulaiTracking = function () {

  const nama = document.getElementById("nama").value;

  if (!nama) {
    alert("Masukkan identitas anggota");
    return;
  }

  document.getElementById("status").innerText = "Mengaktifkan GPS...";

  navigator.geolocation.watchPosition(

    async function(position) {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      // ambil alamat
      let alamatLengkap = "Lokasi tidak diketahui";

      try{
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );

        const data = await response.json();
        alamatLengkap = data.display_name;

      }catch(err){
        console.log("Gagal ambil alamat");
      }

      // kirim ke firebase
      await set(ref(db, "live/" + nama), {
        latitude: lat,
        longitude: lon,
        alamat: alamatLengkap,
        waktu: Date.now(),
        status: "ONLINE"
      });

      document.getElementById("status").innerHTML =
        "STATUS: ONLINE <span class='online-dot'></span>";

    },

    function(error) {
      alert("GPS Error: " + error.message);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,   // jangan pakai cache lokasi
      timeout: 5000
    }

  );

};

</script>

</body>
</html>
