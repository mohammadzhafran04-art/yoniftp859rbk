<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQ - COMMAND CENTER v8.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff00; --neon-blue: #00f2ff; --dark-bg: #000a00; --panel-bg: rgba(0, 10, 0, 0.9); --danger: #ff1144; }
        
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #000; color: var(--neon-green); overflow: hidden; height: 100vh; }
        
        /* Header */
        .header { background: rgba(0,0,0,0.9); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); box-shadow: 0 0 20px rgba(0,255,0,0.3); z-index: 1000; position: relative; }

        .main-container { display: grid; grid-template-columns: 350px 1fr 350px; height: calc(100vh - 65px); gap: 0; background: #000; }
        
        /* Responsive for Mobile */
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; grid-template-rows: 200px 1fr 200px; }
            .panel { overflow-y: scroll; }
        }

        .panel { background: var(--panel-bg); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid rgba(0,255,0,0.2); backdrop-filter: blur(15px); }

        #map { background: #000; height: 100%; width: 100%; }
        
        /* Radar Pulse Animation */
        @keyframes pulse-radar {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
        .radar-icon { border-radius: 50%; animation: pulse-radar 2s infinite; }

        .unit-card { padding: 15px; border: 1px solid rgba(0,255,0,0.2); margin-bottom: 10px; cursor: pointer; transition: 0.3s; background: rgba(0,40,0,0.3); position: relative; border-radius: 4px; }
        .unit-card:hover { background: rgba(0,242,255,0.1); border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .unit-card.sos { border-color: var(--danger); animation: danger-glow 1s infinite alternate; }
        @keyframes danger-glow { from { box-shadow: 0 0 5px var(--danger); } to { box-shadow: 0 0 20px var(--danger); } }

        .stat-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; font-family: 'JetBrains Mono'; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        #detail-box { font-family: 'JetBrains Mono'; font-size: 11px; padding: 15px; border: 1px solid var(--neon-blue); background: rgba(0,0,0,0.8); box-shadow: inset 0 0 10px var(--neon-blue); margin-bottom: 15px; }
        .tag { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 12px; display: block; font-weight: bold; border-left: 3px solid var(--neon-blue); padding-left: 8px; }

        .visual-feed { width: 100%; height: 200px; border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .analytics { margin-top: auto; padding: 15px; background: rgba(0,20,0,0.5); border-top: 1px solid var(--neon-green); font-family: 'JetBrains Mono'; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 3px;">🛰 TAC-COMMAND <span style="color: var(--neon-blue);">OS_V8.0</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 20px; color: #fff; text-shadow: 0 0 10px var(--neon-blue);">00:00:00</div>
    <div id="uplink-stat" style="font-size: 10px; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 4px 10px;">SYSTEM_STABLE</div>
</div>

<div class="main-container">
    <div class="panel">
        <span class="tag">OPERATIONAL_ASSETS</span>
        <div id="unit-list"></div>
        <div class="analytics">
            TOTAL ASSETS: <span id="count">0</span><br>
            AVG VELOCITY: <span id="avg-spd">0</span> KMH
        </div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <span class="tag">UNIT_SPECIFICATIONS</span>
        <div id="detail-box">READY_FOR_UPLINK...</div>
        
        <span class="tag">REALTIME_SATELLITE</span>
        <div class="visual-feed" id="v-feed" style="display:none;">
            <iframe id="sat-view"></iframe>
        </div>

        <div style="margin-top: 20px;">
            <span class="tag">NETWORK_TRAFFIC</span>
            <div id="logs" style="font-family:'JetBrains Mono'; font-size:9px; color:#00ff00; height: 120px; overflow-y:auto; opacity: 0.7;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        });
    }

    // Initialize Map dengan Google Hybrid
    const map = L.map('map', { center: [-7.644, 111.902], zoom: 13, zoomControl: false });
    
    const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
    }).addTo(map);

    let markers = {};
    let pulseCircles = {};
    let selectedId = null;

    setInterval(() => { 
        document.getElementById("clock").innerText = new Date().toLocaleTimeString('en-GB'); 
    }, 1000);

    function addLog(msg) {
        const log = document.getElementById("logs");
        const entry = document.createElement("div");
        entry.innerText = `> ${msg}`;
        log.prepend(entry);
    }

    onValue(ref(db, "live"), snap => {
        const data = snap.val() || {};
        const list = document.getElementById("unit-list");
        list.innerHTML = "";
        let totalSpd = 0;
        let count = 0;

        Object.keys(markers).forEach(id => {
            if(!data[id]) {
                map.removeLayer(markers[id]);
                map.removeLayer(pulseCircles[id]);
                delete markers[id];
                delete pulseCircles[id];
                addLog(`CONN_LOST: ${id}`);
            }
        });

        Object.keys(data).forEach(id => {
            const unit = data[id];
            const isSOS = unit.status === "EMERGENCY";
            const isOnline = (Date.now() - unit.ts) < 15000;
            count++;
            totalSpd += unit.speed;

            const color = isSOS ? '#ff0000' : (isOnline ? '#00ff00' : '#888');

            if(!markers[id]) {
                markers[id] = L.circleMarker([unit.latitude, unit.longitude], {
                    radius: 7, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1
                }).addTo(map);
                
                pulseCircles[id] = L.circleMarker([unit.latitude, unit.longitude], {
                    radius: 7, color: color, weight: 1, fillOpacity: 0, className: 'radar-icon'
                }).addTo(map);
                addLog(`CONN_ESTABLISHED: ${id}`);
            } else {
                markers[id].setLatLng([unit.latitude, unit.longitude]);
                markers[id].setStyle({ fillColor: color });
                pulseCircles[id].setLatLng([unit.latitude, unit.longitude]);
                pulseCircles[id].setStyle({ color: color });
            }

            const card = document.createElement("div");
            card.className = `unit-card ${isSOS ? 'sos' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-weight:bold;">${id}</span>
                    <span style="font-size:8px; background:${color}; color:#000; padding:2px 5px; border-radius:2px;">${unit.status}</span>
                </div>
                <div class="stat-row"><span>VELOCITY</span><span>${unit.speed} KM/H</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(unit.speed, 100)}%; background:var(--neon-blue)"></div></div>
                <div class="stat-row"><span>GPS_PRECISION</span><span>${unit.accuracy}M</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.max(100-unit.accuracy, 10)}%; background:var(--neon-green)"></div></div>
            `;
            
            card.onclick = () => {
                selectedId = id;
                map.flyTo([unit.latitude, unit.longitude], 18);
                showDetail(id, unit);
            };
            list.appendChild(card);
            if(selectedId === id) showDetail(id, unit);
        });

        document.getElementById("count").innerText = count;
        document.getElementById("avg-spd").innerText = count > 0 ? (totalSpd/count).toFixed(1) : 0;
    });

    function showDetail(id, unit) {
        document.getElementById("detail-box").innerHTML = `
            <div style="color:var(--neon-blue); font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">DATA_STREAM: ${id}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>LAT:<br><span style="color:#fff">${unit.latitude.toFixed(6)}</span></div>
                <div>LON:<br><span style="color:#fff">${unit.longitude.toFixed(6)}</span></div>
                <div>SPEED:<br><span style="color:#fff">${unit.speed} KM/H</span></div>
                <div>ACC:<br><span style="color:#fff">±${unit.accuracy}M</span></div>
            </div>
            <div style="margin-top:10px; color:#888; font-size:9px;">LAST_UPLINK: ${new Date(unit.ts).toLocaleTimeString()}</div>
        `;
        
        const feed = document.getElementById("v-feed");
        const frame = document.getElementById("sat-view");
        feed.style.display = "block";
        // Embed Google Maps Satellite dengan Koordinat Unit
        frame.src = `https://maps.google.com/maps?q=${unit.latitude},${unit.longitude}&t=k&z=19&ie=UTF8&iwloc=&output=embed`;
    }
</script>
</body>
</html>
