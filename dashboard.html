<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQ - COMMAND CENTER v12.5 (PRO-TACTICAL)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff00; --neon-blue: #00f2ff; --neon-yellow: #ffff00; --dark-bg: #000a00; --danger: #ff1144; --offline: #555; }
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #000; color: var(--neon-green); overflow: hidden; height: 100vh; }
        
        .leaflet-marker-icon { transition: transform 2s linear !important; cursor: pointer !important; }

        .unit-label {
            background: rgba(0,0,0,0.85); color: #fff; border: 1px solid var(--neon-green);
            padding: 2px 8px; font-size: 10px; border-radius: 4px; white-space: nowrap;
            font-family: 'JetBrains Mono'; position: absolute; top: -30px; left: 50%; 
            transform: translateX(-50%); pointer-events: auto; z-index: 1000;
        }
        .unit-dot { width: 14px; height: 14px; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--neon-green); transition: all 0.5s ease; }

        .header { background: rgba(0,0,0,0.9); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); z-index: 1000; position: relative; }
        .main-container { display: grid; grid-template-columns: 350px 1fr 350px; height: calc(100vh - 65px); background: #000; }
        .panel { background: rgba(0, 10, 0, 0.95); padding: 20px; overflow-y: auto; border: 1px solid rgba(0,255,0,0.1); }
        #map { height: 100%; width: 100%; background: #000; }
        
        .btn-kill-all { width: 100%; background: var(--danger); color: #fff; border: none; padding: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-bottom: 15px; border-radius: 4px; letter-spacing: 1px; }
        .unit-card { padding: 12px; border: 1px solid rgba(0,255,0,0.2); margin-bottom: 10px; background: rgba(0,20,0,0.4); border-radius: 4px; cursor: pointer; transition: all 0.3s; }
        .unit-card:hover { border-color: var(--neon-blue); }
        .card-active { border-color: var(--neon-blue) !important; background: rgba(0,242,255,0.1) !important; }

        /* ANIMASI DENYUT MERAH UNTUK KARTU SOS */
        @keyframes card-sos-pulse {
            0% { box-shadow: 0 0 5px var(--danger); background: rgba(255, 0, 0, 0.1); }
            50% { box-shadow: 0 0 25px var(--danger); background: rgba(255, 0, 0, 0.4); }
            100% { box-shadow: 0 0 5px var(--danger); background: rgba(255, 0, 0, 0.1); }
        }
        .card-sos { 
            animation: card-sos-pulse 0.6s infinite !important; 
            border: 2px solid var(--danger) !important;
            color: #fff !important;
        }

        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #fff; }
        .stat-row { display: flex; justify-content: space-between; font-size: 10px; font-family: 'JetBrains Mono'; margin-bottom: 3px; }
        
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 2px 6px; cursor: pointer; border-radius: 3px; }
        .btn-logout:hover { background: var(--danger); color: #000; }

        .cmd-input { width: 100%; background: #001a00; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px; font-family: 'JetBrains Mono'; font-size: 11px; margin-top: 10px; outline: none; box-sizing: border-box; }
        .btn-send { width: 100%; background: var(--neon-blue); color: #000; border: none; padding: 12px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 8px; }

        @keyframes sos-blink { 0% { background: var(--danger); box-shadow: 0 0 20px red; } 50% { background: #000; } 100% { background: var(--danger); } }
        .sos-active { animation: sos-blink 0.4s infinite !important; }
        #auth-loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="sos-alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto"></audio>
<div id="auth-loader"><h2 style="color:var(--neon-green)">INITIALIZING_HQ_SYSTEM...</h2></div>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 2px;">🛰 TAC-COMMAND <span style="color: var(--neon-blue);">v12.5</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 20px; color: #fff;">00:00:00</div>
    <div style="font-size: 10px; color: var(--neon-green);">REMOTE_WIPE: READY</div>
</div>

<div class="main-container">
    <div class="panel">
        <button class="btn-kill-all" onclick="killAllUnits()">TERMINATE & WIPE ALL DATA</button>
        <div style="display:flex; justify-content: space-between;">
            <span style="font-size: 10px; color: var(--neon-blue); font-weight: bold;">[ ACTIVE_ASSETS ]</span>
            <span id="sos-count" style="font-size: 10px; color: var(--danger); font-weight: bold;"></span>
        </div>
        <div id="unit-list" style="margin-top: 10px;"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <span style="font-size: 10px; color: var(--neon-blue); font-weight: bold;">[ COMMAND_UPLINK ]</span>
        <div id="detail-box" style="margin-top:10px; font-size:11px; border:1px solid #333; padding:12px; background:rgba(0,0,0,0.6)">PILIH UNIT UNTUK MONITORING...</div>
        
        <div id="comm-panel" style="display:none; margin-top:15px;">
            <input type="text" id="msgText" class="cmd-input" placeholder="KETIK INSTRUKSI...">
            <button class="btn-send" id="btnSend">SEND DIRECT MESSAGE</button>
        </div>

        <div style="margin-top:25px;">
            <span style="font-size: 10px; color: var(--neon-blue); font-weight: bold;">[ SATELLITE_FEED ]</span>
            <div id="v-feed" style="height:220px; border:1px solid #333; margin-top:10px; display:none;">
                <iframe id="sat-view" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {}, selectedId = null;

    setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString(); }, 1000);
    
    map = L.map('map', { center: [-0.73, 135.74], zoom: 14, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains: ['mt0','mt1','mt2','mt3'] }).addTo(map);
    document.getElementById("auth-loader").style.display = "none";

    onValue(ref(db, "live"), snap => {
        const data = snap.val() || {};
        const list = document.getElementById("unit-list");
        list.innerHTML = "";
        let sosActiveCount = 0;

        // Cleanup markers
        Object.keys(markers).forEach(id => {
            if(!data[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });

        Object.keys(data).forEach(id => {
            const unit = data[id];
            const diff = Date.now() - unit.ts;
            
            // LOGIKA SYNC DENGAN APK (Mendeteksi status dari MainActivity.kt)
            const isSOS = unit.sos === true || unit.status === "SOS_ACTIVE" || unit.status === "SOS_ACTIVATED";
            const isLag = diff >= 25000;
            
            if(isSOS) sosActiveCount++;

            let statusColor = "#00ff00"; 
            let statusText = unit.status || "ACTIVE";

            if (isSOS) {
                statusColor = "#ff1144"; 
                statusText = "!!! EMERGENCY SOS !!!";
            } else if (isLag) {
                statusColor = "#ffff00"; 
                statusText = "SIGNAL_LAG";
            }

            // MARKER UPDATES
            if (unit.latitude) {
                const iconHtml = `
                    <div style="position:relative;">
                        <div class="unit-label" style="border-color:${statusColor}">${id}</div>
                        <div class="unit-dot ${isSOS ? 'sos-active' : ''}" style="background:${statusColor}; box-shadow: 0 0 15px ${statusColor}"></div>
                    </div>`;
                const customIcon = L.divIcon({ className: '', html: iconHtml, iconSize: [14, 14], iconAnchor: [7, 7] });

                if(!markers[id]) {
                    markers[id] = L.marker([unit.latitude, unit.longitude], { icon: customIcon }).addTo(map);
                    markers[id].on('click', () => selectUnit(id, unit));
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                    markers[id].setIcon(customIcon);
                }
            }

            // LIST CARD DENGAN EFEK BERDENYUT JIKA SOS
            const card = document.createElement("div");
            card.className = `unit-card ${selectedId === id ? 'card-active' : ''} ${isSOS ? 'card-sos' : ''}`;
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-weight:bold; font-size:11px;">${id}</span>
                    <button class="btn-logout" onclick="event.stopPropagation(); remoteKill('${id}')">WIPE</button>
                </div>
                <div class="stat-row">
                    <span>STATUS</span>
                    <span style="font-weight:bold;">
                        <span class="status-indicator" style="background:${statusColor}"></span>
                        <span style="color:${statusColor}">${statusText}</span>
                    </span>
                </div>
                <div class="stat-row"><span>VELOCITY</span><span>${unit.speed || 0} KMH</span></div>
                <div class="stat-row"><span>ENERGY</span><span>${unit.battery}%</span></div>
            `;
            card.onclick = () => selectUnit(id, unit);
            list.appendChild(card);
        });

        // Alarm dan Counter SOS
        if(sosActiveCount > 0) {
            document.getElementById("sos-alarm").play();
            document.getElementById("sos-count").innerText = `[ ${sosActiveCount} SOS_ACTIVE ]`;
        } else {
            document.getElementById("sos-count").innerText = "";
        }
    });

    // Fitur lainnya tetap sama...
    window.killAllUnits = function() {
        if(confirm("TERMINATE & WIPE ALL DATA?")) remove(ref(db, "live"));
    };

    window.remoteKill = function(id) {
        if(confirm(`WIPE DATA UNIT: ${id}?`)) remove(ref(db, `live/${id}`));
    };

    function selectUnit(id, unit) {
        selectedId = id;
        map.flyTo([unit.latitude, unit.longitude], 18);
        document.getElementById("comm-panel").style.display = "block";
        document.getElementById("v-feed").style.display = "block";
        document.getElementById("sat-view").src = `https://maps.google.com/maps?q=${unit.latitude},${unit.longitude}&t=k&z=19&output=embed`;
        document.getElementById("detail-box").innerHTML = `
            <div style="color:var(--neon-blue); font-weight:bold; border-bottom:1px solid #333; margin-bottom:8px; padding-bottom:4px;">${id}</div>
            COORD: ${unit.latitude.toFixed(6)}, ${unit.longitude.toFixed(6)}<br>
            ACCURACY: ±${unit.accuracy}m<br>
            SPEED: ${unit.speed} KMH
        `;
    }

    document.getElementById("btnSend").onclick = () => {
        const txt = document.getElementById("msgText").value;
        if(!selectedId || !txt) return;
        set(ref(db, `live/${selectedId}/command_msg`), { text: txt, ts: Date.now() });
        document.getElementById("msgText").value = "";
    };
</script>
</body>
</html>
