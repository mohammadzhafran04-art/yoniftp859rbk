<!DOCTYPE html>
<html>
<head>
    <title>HQ_DASHBOARD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Rajdhani'; display: flex; height: 100vh; }
        #sidebar { width: 300px; border-right: 1px solid #00ff41; padding: 15px; overflow-y: auto; background: rgba(0,10,0,0.9); }
        #map { flex-grow: 1; filter: invert(100%) hue-rotate(180deg) brightness(0.5); }
        .card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #00ff41; background: rgba(0,255,0,0.1); }
        .online { color: #00ff41; font-size: 10px; }
        .offline { color: #555; font-size: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="font-family: 'Orbitron'; font-size: 18px;">ACTIVE_UNITS</h2>
        <div id="list">MENCARI SIGNAL...</div>
    </div>
    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = {
            databaseURL: "https://real-time-location-30d91-default-rtdb.asia-southeast1.firebasedatabase.app",
        };

        const app = initializeApp(conf);
        const db = getDatabase(app);
        const map = L.map('map').setView([-2.0, 120.0], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};

        onValue(ref(db, 'live'), (snap) => {
            const data = snap.val();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            if(!data) return;

            for(let id in data) {
                const u = data[id];
                const pos = [u.lat, u.lon];
                const isOnline = (Date.now() - u.waktu) < 30000;

                // Update Marker
                if(markers[id]) {
                    markers[id].setLatLng(pos);
                } else {
                    markers[id] = L.circleMarker(pos, {color: '#0f0', radius: 8}).addTo(map).bindTooltip(id);
                }

                // Update List
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${id}</strong><br>
                                  <span class="${isOnline?'online':'offline'}">${isOnline?'● ONLINE':'○ OFFLINE'}</span><br>
                                  <small>SPD: ${(u.speed*3.6).toFixed(1)} KM/H</small>`;
                card.onclick = () => map.flyTo(pos, 15);
                listDiv.appendChild(card);
            }
        });
    </script>
</body>
</html>
