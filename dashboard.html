<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQ - COMMAND CENTER v8.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff00; --neon-blue: #00f2ff; --dark-bg: #000a00; --panel-bg: rgba(0, 10, 0, 0.9); --danger: #ff1144; }
        
        .leaflet-marker-icon { transition: transform 3s linear !important; }
        .unit-dot { width: 14px; height: 14px; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #000; color: var(--neon-green); overflow: hidden; height: 100vh; }
        .header { background: rgba(0,0,0,0.9); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-green); z-index: 1000; position: relative; }
        .main-container { display: grid; grid-template-columns: 350px 1fr 350px; height: calc(100vh - 65px); gap: 0; background: #000; }
        
        @media (max-width: 1024px) { .main-container { grid-template-columns: 1fr; grid-template-rows: 200px 1fr 200px; } }

        .panel { background: var(--panel-bg); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid rgba(0,255,0,0.2); }
        #map { background: #000; height: 100%; width: 100%; }
        
        @keyframes pulse-radar { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }
        .radar-icon { border-radius: 50%; animation: pulse-radar 2s infinite; }

        .unit-card { padding: 15px; border: 1px solid rgba(0,255,0,0.2); margin-bottom: 10px; cursor: pointer; background: rgba(0,40,0,0.3); border-radius: 4px; }
        .unit-card:hover { background: rgba(0,242,255,0.1); border-color: var(--neon-blue); }
        .btn-remote-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-family: 'JetBrains Mono'; font-size: 9px; padding: 2px 8px; cursor: pointer; font-weight: bold; }
        .btn-remote-logout:hover { background: var(--danger); color: #000; }

        .stat-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; font-family: 'JetBrains Mono'; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.6s; }

        #detail-box { font-family: 'JetBrains Mono'; font-size: 11px; padding: 15px; border: 1px solid var(--neon-blue); background: rgba(0,0,0,0.8); margin-bottom: 15px; }
        .tag { font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 12px; display: block; font-weight: bold; border-left: 3px solid var(--neon-blue); padding-left: 8px; }
        .analytics { margin-top: auto; padding: 15px; background: rgba(0,20,0,0.5); border-top: 1px solid var(--neon-green); font-family: 'JetBrains Mono'; font-size: 10px; }
        #auth-loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 3px;">🛰 TAC-COMMAND <span style="color: var(--neon-blue);">OS_V8.0</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 20px; color: #fff;">00:00:00</div>
    <div id="uplink-stat" style="font-size: 10px; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 4px 10px;">SYSTEM_STABLE</div>
</div>

<div class="main-container">
    <div class="panel">
        <span class="tag">OPERATIONAL_ASSETS</span>
        <div id="unit-list"></div>
        <div class="analytics">TOTAL ASSETS: <span id="count">0</span> | AVG VELOCITY: <span id="avg-spd">0</span> KMH</div>
    </div>
    <div id="map"></div>
    <div class="panel">
        <span class="tag">UNIT_SPECIFICATIONS</span>
        <div id="detail-box">WAITING_FOR_DATA...</div>
        <span class="tag">NETWORK_LOGS</span>
        <div id="logs" style="font-family:'JetBrains Mono'; font-size:9px; color:#00ff00; height: 200px; overflow-y:auto;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    let map = L.map('map', { center: [-7.644, 135.74], zoom: 13, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] }).addTo(map);

    let markers = {};
    let pulseCircles = {};
    let selectedId = null;

    function addLog(msg) {
        const log = document.getElementById("logs");
        const entry = document.createElement("div");
        entry.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(entry);
    }

    window.remoteLogoutUnit = function(id) {
        if(confirm(`TERMINATE UPLINK FOR ${id}?`)) {
            remove(ref(db, `live/${id}`)).then(() => addLog(`REMOTE_KILL_SENT: ${id}`));
        }
    };

    onValue(ref(db, "live"), snap => {
        const data = snap.val() || {};
        const list = document.getElementById("unit-list");
        list.innerHTML = "";
        let totalSpd = 0, count = 0;

        // Cleanup
        Object.keys(markers).forEach(id => {
            if(!data[id]) {
                map.removeLayer(markers[id]);
                map.removeLayer(pulseCircles[id]);
                delete markers[id];
                delete pulseCircles[id];
                addLog(`DISCONNECTED: ${id}`);
            }
        });

        Object.keys(data).forEach(id => {
            const unit = data[id];
            if (!unit.ts) return;

            const isOnline = (Date.now() - unit.ts) < 30000;
            const color = isOnline ? '#00ff00' : '#ff1144';
            count++;
            totalSpd += (unit.speed || 0);

            // Update Map if coordinates exist
            if (unit.latitude && unit.longitude) {
                const customIcon = L.divIcon({
                    className: 'custom-icon',
                    html: `<div class="unit-dot" style="background:${color};"></div>`,
                    iconSize: [14, 14], iconAnchor: [7, 7]
                });

                if(!markers[id]) {
                    markers[id] = L.marker([unit.latitude, unit.longitude], { icon: customIcon }).addTo(map);
                    pulseCircles[id] = L.circleMarker([unit.latitude, unit.longitude], { radius: 7, color: color, weight: 1, fillOpacity: 0, className: 'radar-icon' }).addTo(map);
                    addLog(`UPLINK_ESTABLISHED: ${id}`);
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                    markers[id].setIcon(customIcon);
                    pulseCircles[id].setLatLng([unit.latitude, unit.longitude]);
                    pulseCircles[id].setStyle({ color: color });
                }
            }

            // Add to List
            const card = document.createElement("div");
            card.className = "unit-card";
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-weight:bold; font-size:11px;">${id}</span>
                    <button class="btn-remote-logout" onclick="event.stopPropagation(); remoteLogoutUnit('${id}')">LOGOUT</button>
                </div>
                <div class="stat-row"><span>VELOCITY</span><span>${unit.speed || 0} KMH</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(unit.speed || 0, 100)}%; background:var(--neon-blue)"></div></div>
                <div class="stat-row"><span>STATUS</span><span style="color:${color}">${isOnline ? (unit.status || 'ONLINE') : 'OFFLINE'}</span></div>
            `;
            card.onclick = () => {
                if (unit.latitude) {
                    selectedId = id;
                    map.flyTo([unit.latitude, unit.longitude], 18);
                    showDetail(id, unit);
                }
            };
            list.appendChild(card);
        });

        document.getElementById("count").innerText = count;
        document.getElementById("avg-spd").innerText = count > 0 ? (totalSpd/count).toFixed(1) : 0;
    });

    function showDetail(id, unit) {
        document.getElementById("detail-box").innerHTML = `
            <div style="color:var(--neon-blue); font-weight:bold; margin-bottom:10px;">ID: ${id}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <div>LAT: ${unit.latitude.toFixed(6)}</div>
                <div>LON: ${unit.longitude.toFixed(6)}</div>
                <div>ACC: ±${unit.accuracy}M</div>
                <div>BAT: ${unit.battery}%</div>
            </div>
        `;
    }
</script>
</body>
</html>
