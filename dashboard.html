<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>COMMAND CENTER - HQ ULTRA HD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root {
            --neon-green: #00ff00;
            --neon-blue: #00f2ff;
            --dark-panel: rgba(2, 10, 2, 0.95);
            --danger: #ff3333;
        }

        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #000; color: var(--neon-green); overflow: hidden; }
        
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.3;
        }

        .header {
            background: #020a02; padding: 10px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); position: relative; z-index: 1000;
        }

        .container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 58px); }
        
        .panel { 
            background: var(--dark-panel); padding: 15px; 
            border-right: 1px solid var(--neon-green); overflow-y: auto; 
            backdrop-filter: blur(15px);
        }
        .panel-right { border-right: none; border-left: 1px solid var(--neon-green); display: flex; flex-direction: column; }

        #map { background: #000; height: 100%; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card {
            background: rgba(0,0,0,0.8); border: 1px solid var(--neon-green); padding: 10px;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.1); text-align: center;
        }

        .unit-item {
            padding: 12px; border: 1px solid rgba(0, 255, 0, 0.1); cursor: pointer; 
            transition: 0.3s; background: rgba(0,255,0,0.02); margin-bottom: 8px; position: relative;
        }
        .unit-item:hover { background: rgba(0, 255, 0, 0.1); border-left: 5px solid var(--neon-blue); }
        .unit-item.selected { border-left: 5px solid var(--neon-blue); background: rgba(0, 242, 255, 0.05); }

        .marker-pulse {
            width: 20px; height: 20px; background: var(--neon-green); 
            border: 2px solid #fff; border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        #detailBox {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6;
            color: #fff; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        #visualFeed {
            width: 100%; height: 200px; border: 1px solid var(--neon-blue);
            margin-top: 15px; position: relative; background: #000;
            overflow: hidden; display: none;
        }
        #visualFrame { 
            width: 100%; height: 100%; border: none;
            filter: brightness(0.8) contrast(1.2) grayscale(1) sepia(1) hue-rotate(85deg) saturate(5);
        }
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid rgba(0, 242, 255, 0.3); pointer-events: none;
            background: linear-gradient(to bottom, transparent 90%, rgba(0, 242, 255, 0.1));
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .hud-text { position: absolute; top: 5px; left: 5px; font-size: 8px; color: var(--neon-blue); text-shadow: 1px 1px #000; z-index: 10; }

        .tag { font-size: 8px; color: var(--neon-green); display: block; margin-bottom: 5px; opacity: 0.7; }
        .val-large { font-size: 22px; font-weight: bold; display: block; }
        .logout-btn {
            background: transparent; color: var(--danger); border: 1px solid var(--danger);
            padding: 6px 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s;
        }
        .logout-btn:hover { background: var(--danger); color: #fff; }
        .search-box {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--neon-green); color: var(--neon-green);
            font-family: 'JetBrains Mono'; outline: none; margin-bottom: 15px; box-sizing: border-box;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); }
    </style>
</head>
<body>

<div class="header">
    <div style="letter-spacing: 3px;">🛰 <span style="color: var(--neon-blue);">HQ</span> COMMAND // MONITORING_v4.0</div>
    <button class="logout-btn" onclick="logout()">LOGOUT SESSION</button>
</div>

<div class="container">
    <div class="panel">
        <div class="stat-grid">
            <div class="stat-card">
                <span class="tag">TOTAL_ASSETS</span>
                <span id="totalUnit" class="val-large">0</span>
            </div>
            <div class="stat-card" style="border-color: var(--neon-blue);">
                <span class="tag" style="color: var(--neon-blue);">ACTIVE_LINK</span>
                <span id="onlineUnit" class="val-large" style="color: var(--neon-blue);">0</span>
            </div>
        </div>
        
        <input type="text" id="search" class="search-box" placeholder="> SEARCH_CALLSIGN...">
        <div id="listUnit"></div>
    </div>

    <div id="map"></div>

    <div class="panel panel-right">
        <h4 style="font-size: 12px; margin-top: 0; color: var(--neon-blue);">[ TELEMETRY_STREAM ]</h4>
        <div id="detailBox">SELECT ASSET TO SYNC...</div>
        
        <div id="visualFeed">
            <div class="hud-text">> VISUAL_RECON_ALPHA_LIVE</div>
            <div class="hud-overlay"></div>
            <iframe id="visualFrame" src=""></iframe>
        </div>

        <div class="stat-card" style="margin-top: 20px; text-align: left; border-style: dashed; flex-grow: 1;">
            <span class="tag">SYSTEM_LOGS</span>
            <div id="logs" style="font-family: 'JetBrains Mono'; font-size: 9px; color: #888;">
                > Waiting for data uplink...<br>
                > Security: AES-256 Active<br>
                > Map: Satellite Hybrid
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri Satellite' });
    const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png');
    
    const map = L.map("map", { center: [-2, 118], zoom: 5, zoomControl: false, layers: [satLayer, labelLayer] });
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let markers = {};
    let selectedUnit = null;

    onValue(ref(db, "live"), snap => {
        const data = snap.val();
        if(!data) return;

        const list = document.getElementById("listUnit");
        const searchTerm = document.getElementById("search").value.toUpperCase();
        list.innerHTML = "";
        let count = 0, online = 0;

        Object.keys(data).forEach(nama => {
            const unit = data[nama];
            const isOnline = (Date.now() - unit.waktu) < 30000;
            count++; if(isOnline) online++;

            if(nama.toUpperCase().includes(searchTerm)) {
                if(!markers[nama]) {
                    const icon = L.divIcon({ className: '', html: `<div class="marker-pulse" id="m-${nama}"></div>`, iconSize: [20, 20], iconAnchor: [10, 10] });
                    markers[nama] = L.marker([unit.latitude, unit.longitude], {icon: icon}).addTo(map);
                }
                markers[nama].setLatLng([unit.latitude, unit.longitude]);

                const item = document.createElement("div");
                item.className = `unit-item ${selectedUnit === nama ? 'selected' : ''}`;
                item.innerHTML = `
                    <div style="font-size: 11px; font-weight: bold;">> ${nama}</div>
                    <div style="font-size: 8px; color: ${isOnline ? '#00ff00' : '#ff3333'};">
                        ${isOnline ? 'SIGNAL_STABLE' : 'SIGNAL_LOST'}
                    </div>
                `;
                
                item.onclick = () => {
                    selectedUnit = nama;
                    map.flyTo([unit.latitude, unit.longitude], 18);
                    updateDetail(nama, unit, isOnline);
                };
                list.appendChild(item);

                if(selectedUnit === nama) updateDetail(nama, unit, isOnline);
            }
        });
        document.getElementById("totalUnit").innerText = count;
        document.getElementById("onlineUnit").innerText = online;
    });

    function updateDetail(nama, unit, isOnline) {
        document.getElementById("detailBox").innerHTML = `
            <span style="color:var(--neon-blue)">// ASSET_IDENT: ${nama}</span><br>
            STATUS : <span style="color:${isOnline?'#00ff00':'#ff3333'}">${isOnline?'ONLINE':'OFFLINE'}</span><br>
            --------------------------<br>
            COORDS : ${unit.latitude.toFixed(6)}, ${unit.longitude.toFixed(6)}<br>
            VELOCITY: ${unit.speed} KM/H<br>
            ACCURACY: ${unit.accuracy} METERS<br>
            --------------------------<br>
            UPLINK : ENCRYPTED_SATELLITE
        `;

        const visualFeed = document.getElementById("visualFeed");
        const visualFrame = document.getElementById("visualFrame");
        visualFeed.style.display = "block";
        
        const lat = unit.latitude;
        const lng = unit.longitude;

        // FIX: Menggunakan URL Embed resmi untuk Street View yang lebih stabil
        visualFrame.src = `https://www.google.com/maps/embed/v1/streetview?key=${firebaseConfig.apiKey}&location=${lat},${lng}&heading=210&pitch=10&fov=90`;
    }

    window.logout = () => { localStorage.removeItem("auth"); window.location.href="login.html"; };
</script>
</body>
</html>
