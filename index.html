<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT MONITORING - TACTICAL HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #000800;
            --glass-bg: rgba(5, 15, 5, 0.95);
            --danger: #ff0033;
            --warning: #ffcc00;
        }

        body { 
            margin: 0; font-family: 'Orbitron', sans-serif; 
            background: var(--dark-bg); color: var(--neon-green); 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* CRT Scanline Effect */
        body::before { 
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none; 
        }

        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono'; font-size: 12px;
        }

        .header { 
            background: #021202; padding: 15px; text-align: center; 
            border-bottom: 2px solid var(--neon-green); font-weight: bold; 
            letter-spacing: 4px; z-index: 50; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3);
        }

        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; padding: 20px; position: relative; }

        .signal-meter { display: flex; gap: 3px; align-items: flex-end; height: 15px; margin-bottom: 10px; }
        .sig-bar { width: 4px; background: rgba(0,255,0,0.1); border-radius: 1px; transition: 0.3s; }
        .sig-bar.active { background: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); }

        #compass {
            width: 100px; height: 100px; border: 1px solid var(--neon-green);
            border-radius: 50%; margin-bottom: 15px; position: relative;
            transition: transform 0.1s ease-out; box-shadow: 0 0 15px rgba(0,255,0,0.1);
        }
        #compass::after { content: "N"; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: bold; }
        .needle { position: absolute; top: 50%; left: 50%; width: 2px; height: 40px; background: var(--danger); transform-origin: bottom; transform: translate(-50%, -100%); }

        .card { 
            background: var(--glass-bg); padding: 20px; width: 100%; max-width: 340px; 
            border: 1px solid var(--neon-green); position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,255,0,0.05);
        }

        .scan-line {
            position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.2);
            top: 0; left: 0; animation: scan 4s infinite linear; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        input { 
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.8); 
            border: 1px solid var(--neon-green); color: var(--neon-green); 
            font-family: 'JetBrains Mono'; margin-bottom: 15px; 
            box-sizing: border-box; outline: none; text-align: center; border-radius: 2px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        button { 
            width: 100%; padding: 16px; border: none; font-weight: bold; cursor: pointer; 
            font-family: 'Orbitron'; text-transform: uppercase; transition: 0.3s; border-radius: 2px;
        }

        #btnTrack { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
        #btnTrack:disabled { background: #003300; color: #008800; cursor: default; box-shadow: none; }

        .btn-terminate { 
            background: transparent; color: var(--danger); border: 1px solid var(--danger); 
            font-size: 10px; display: none; margin-top: 10px; letter-spacing: 1px;
        }
        .btn-terminate:active { background: var(--danger); color: #fff; }

        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; font-family: 'JetBrains Mono'; }
        .tel-box { background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid rgba(0, 255, 0, 0.1); }
        .tel-label { font-size: 7px; color: #666; display: block; margin-bottom: 3px; }
        .tel-val { font-size: 13px; font-weight: bold; color: #fff; }

        #status-bar { width: 100%; max-width: 340px; display: flex; justify-content: space-between; font-size: 9px; margin-top: 12px; font-family: 'JetBrains Mono'; }
        .active-glow { animation: glow 2s infinite; color: var(--warning); }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .footer-info { background: #010a01; width: 100%; padding: 8px; text-align: center; font-size: 8px; color: rgba(0,255,0,0.4); border-top: 1px solid rgba(0,255,0,0.2); }
    </style>
</head>
<body>

<div id="boot-screen">
    <div style="margin-bottom: 20px; color: var(--neon-green);" id="boot-text">> INITIALIZING SATELLITE LINK...</div>
    <div style="width: 200px; height: 2px; background: #111; overflow: hidden;">
        <div id="boot-progress" style="width: 0%; height: 100%; background: var(--neon-green);"></div>
    </div>
</div>

<div class="header">Yonif 859 // Tactical Uplink</div>

<div class="container">
    <div class="signal-meter">
        <div class="sig-bar" style="height: 4px;"></div>
        <div class="sig-bar" style="height: 7px;"></div>
        <div class="sig-bar" style="height: 10px;"></div>
        <div class="sig-bar" style="height: 13px;"></div>
        <div class="sig-bar" style="height: 16px;"></div>
    </div>

    <div id="compass"><div class="needle"></div></div>

    <div class="card" id="mainCard">
        <div class="scan-line"></div>
        <input type="text" id="nama" placeholder="CALLSIGN / UNIT NAME" maxlength="15" spellcheck="false">
        
        <div class="btn-group">
            <button id="btnTrack">Initiate Link</button>
            <button id="btnTerminate" class="btn-terminate">Terminate & Scrub Data</button>
        </div>
        
        <div class="telemetry">
            <div class="tel-box"><span class="tel-label">LATITUDE</span><span class="tel-val" id="lat">0.00000</span></div>
            <div class="tel-box"><span class="tel-label">LONGITUDE</span><span class="tel-val" id="lon">0.00000</span></div>
            <div class="tel-box"><span class="tel-label">VELOCITY</span><span class="tel-val"><span id="spd">0</span> KM/H</span></div>
            <div class="tel-box"><span class="tel-label">PRECISION</span><span class="tel-val"><span id="acc">0</span> M</span></div>
        </div>
    </div>

    <div id="status-bar">
        <span id="pwr">PWR: --%</span>
        <span id="msg" class="active-glow">AWAITING AUTH...</span>
        <span id="time">00:00:00</span>
    </div>
</div>

<div class="footer-info">SECURE CHANNEL // AES-256 BIT // YONIF 859 HQ</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btn = document.getElementById("btnTrack");
    const btnTerm = document.getElementById("btnTerminate");
    const bootScreen = document.getElementById("boot-screen");
    const compass = document.getElementById("compass");
    let watchID = null;

    // Clock & Battery
    setInterval(() => { document.getElementById("time").innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    if (navigator.getBattery) {
        navigator.getBattery().then(bat => {
            const up = () => document.getElementById("pwr").innerText = `PWR: ${Math.round(bat.level * 100)}%`;
            up(); bat.onlevelchange = up;
        });
    }

    // Compass
    window.addEventListener("deviceorientation", (e) => {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        compass.style.transform = `rotate(${-heading}deg)`;
    });

    btn.onclick = async function() {
        const nama = document.getElementById("nama").value.trim().toUpperCase();
        if(!nama) return alert("UNIT CALLSIGN REQUIRED");

        // Start Booting
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        bootScreen.style.display = 'flex';
        const steps = ["> SECURING CHANNEL...", "> BYPASSING FIREWALL...", "> CALIBRATING GPS...", "> LINK ESTABLISHED!"];
        for(let i=0; i<=100; i+=5) {
            document.getElementById("boot-progress").style.width = i + '%';
            if(i % 25 === 0) document.getElementById("boot-text").innerText = steps[i/25];
            await new Promise(r => setTimeout(r, 40));
        }
        bootScreen.style.display = 'none';

        // UI Prep
        btn.disabled = true;
        btn.innerText = "UPLINK ACTIVE";
        btnTerm.style.display = 'block';
        document.getElementById("msg").innerText = "TRANSMITTING";
        document.querySelectorAll('.sig-bar').forEach((b, i) => setTimeout(() => b.classList.add('active'), i * 150));

        if ("wakeLock" in navigator) {
            try { await navigator.wakeLock.request("screen"); } catch (err) {}
        }

        watchID = navigator.geolocation.watchPosition((pos) => {
            const updates = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                speed: Math.round((pos.coords.speed || 0) * 3.6),
                accuracy: Math.round(pos.coords.accuracy),
                waktu: Date.now(),
                status: "ONLINE"
            };

            // Update Firebase
            set(ref(db, "live/" + nama), updates);
            
            // Auto-remove on crash/disconnect
            onDisconnect(ref(db, "live/" + nama)).remove();

            // Local UI Update
            document.getElementById("lat").innerText = updates.latitude.toFixed(5);
            document.getElementById("lon").innerText = updates.longitude.toFixed(5);
            document.getElementById("spd").innerText = updates.speed;
            document.getElementById("acc").innerText = updates.accuracy;
        }, (err) => {
            document.getElementById("msg").innerText = "SIGNAL LOST";
        }, { enableHighAccuracy: true });
    };

    btnTerm.onclick = async function() {
        if(confirm("DANGER: SCRUB DATA & DISCONNECT?")) {
            const nama = document.getElementById("nama").value.trim().toUpperCase();
            
            if (navigator.vibrate) navigator.vibrate(200);
            
            // 1. Stop GPS Watch
            if(watchID) navigator.geolocation.clearWatch(watchID);
            
            // 2. Remove from Firebase Dashboard (Permanent Delete)
            try {
                await remove(ref(db, "live/" + nama));
                console.log("Unit data scrubbed from HQ.");
            } catch (e) { console.error("Scrub failed", e); }
            
            // 3. Glitch Effect & Reset
            document.body.style.filter = "invert(1) contrast(2) hue-rotate(180deg)";
            setTimeout(() => window.location.reload(), 400);
        }
    };
</script>
</body>
</html>
