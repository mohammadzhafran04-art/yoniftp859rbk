<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HQ - COMMAND CENTER v7.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root { --neon-green: #00ff00; --neon-blue: #00f2ff; --dark-bg: #030803; --panel-bg: rgba(5, 15, 5, 0.9); --danger: #ff3333; }
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: var(--dark-bg); color: var(--neon-green); overflow: hidden; height: 100vh; }
        .header { background: rgba(0,0,0,0.9); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-green); box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .main-container { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 65px); gap: 5px; background: #111; }
        .panel { background: var(--panel-bg); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid rgba(0,255,0,0.1); }
        #map { background: #000; filter: grayscale(0.6) brightness(0.8) contrast(1.2); }
        .unit-card { padding: 12px; border: 1px solid rgba(0,255,0,0.2); margin-bottom: 8px; cursor: pointer; transition: 0.2s; background: rgba(0,20,0,0.3); }
        .unit-card:hover { border-color: var(--neon-blue); background: rgba(0,242,255,0.05); }
        .unit-card.sos { border-color: var(--danger); animation: pulseDanger 1s infinite; }
        @keyframes pulseDanger { 0% { box-shadow: inset 0 0 5px var(--danger); } 50% { box-shadow: inset 0 0 15px var(--danger); } 100% { box-shadow: inset 0 0 5px var(--danger); } }
        #detail-box { font-family: 'JetBrains Mono'; font-size: 12px; padding: 15px; border: 1px solid var(--neon-blue); background: rgba(0,0,0,0.5); min-height: 100px; }
        .visual-feed { width: 100%; height: 200px; margin-top: 15px; border: 1px solid #333; position: relative; }
        iframe { width: 100%; height: 100%; border: none; filter: saturate(1.5) contrast(1.2); }
        .tag { font-size: 9px; color: var(--neon-blue); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 2px;">🛰 COMMAND CENTER <span style="color: var(--neon-blue);">GLOBAL_V7</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono';">00:00:00</div>
    <div style="font-size: 10px; color: #555;">ENCRYPTED_UPLINK_STABLE</div>
</div>

<div class="main-container">
    <div class="panel">
        <span class="tag">ASSETS_ACTIVE</span>
        <div id="unit-list" style="margin-top: 10px;"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <span class="tag">INTEL_STREAM</span>
        <div id="detail-box" style="margin-top: 10px;">AWAITING_SELECTION...</div>
        <div class="visual-feed" id="v-feed" style="display:none;">
            <iframe id="sat-view"></iframe>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const map = L.map('map', { center: [-2, 118], zoom: 5, zoomControl: false });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markers = {};
    let selectedId = null;

    setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    onValue(ref(db, "live"), snap => {
        const data = snap.val() || {};
        const list = document.getElementById("unit-list");
        list.innerHTML = "";

        Object.keys(data).forEach(id => {
            const unit = data[id];
            const isOnline = (Date.now() - unit.ts) < 20000;
            const isSOS = unit.status === "EMERGENCY";

            // Map Logic
            if(!markers[id]) {
                markers[id] = L.circleMarker([unit.latitude, unit.longitude], {
                    radius: 8, color: isSOS ? '#ff0000' : '#00ff00', fillOpacity: 0.8
                }).addTo(map);
            } else {
                markers[id].setLatLng([unit.latitude, unit.longitude]);
                markers[id].setStyle({ color: isSOS ? '#ff0000' : '#00ff00' });
            }

            // List UI
            const card = document.createElement("div");
            card.className = `unit-card ${isSOS ? 'sos' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${id}</strong>
                    <span style="color:${isOnline?'#00ff00':'#ff3333'}">●</span>
                </div>
                <div style="font-size:10px; opacity:0.6; font-family:'JetBrains Mono'">${unit.speed} KMH | ACC: ${unit.accuracy}M</div>
            `;
            card.onclick = () => {
                selectedId = id;
                map.flyTo([unit.latitude, unit.longitude], 17);
                showDetail(id, unit);
            };
            list.appendChild(card);

            if(selectedId === id) showDetail(id, unit);
        });
    });

    function showDetail(id, unit) {
        document.getElementById("detail-box").innerHTML = `
            <div style="color:var(--neon-blue); border-bottom:1px solid #222; margin-bottom:10px;">ID: ${id}</div>
            STATUS: ${unit.status}<br>
            LAT: ${unit.latitude.toFixed(5)}<br>
            LON: ${unit.longitude.toFixed(5)}<br>
            SPEED: ${unit.speed} KM/H<br>
            UPDATE: ${new Date(unit.ts).toLocaleTimeString()}
        `;
        const feed = document.getElementById("v-feed");
        const frame = document.getElementById("sat-view");
        feed.style.display = "block";
        frame.src = `https://maps.google.com/maps?q=${unit.latitude},${unit.longitude}&t=k&z=19&ie=UTF8&iwloc=&output=embed`;
    }
</script>
</body>
</html>
