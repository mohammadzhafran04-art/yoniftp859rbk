<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT MONITORING - TACTICAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: #020502; color: #00ff00; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .header { background: #051a05; padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); font-weight: bold; letter-spacing: 3px; z-index: 5; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .card { background: rgba(10, 20, 10, 0.9); padding: 30px; width: 320px; border: 1px solid #00ff00; border-radius: 5px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        h2 { text-align: center; font-size: 14px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #00ff00; color: #00ff00; font-family: 'Orbitron'; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Orbitron'; }
        button:hover { background: #008800; box-shadow: 0 0 20px #00ff00; }
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid rgba(0,255,0,0.3); padding-top: 15px; font-size: 10px; }
        .status-on { color: #00ff00; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">SYSTEM MONITORING YONIF 859</div>

<div class="container">
    <div class="card">
        <h2>UNIT IDENTIFICATION</h2>
        <input type="text" id="nama" placeholder="CALLSIGN / NAMA">
        <button id="btnTrack">ACTIVATE TRANSMISSION</button>
        <div id="msg" style="text-align:center; font-size:11px; margin-top:10px;">READY</div>
        
        <div class="telemetry">
            <div>LAT: <span id="lat">0.00</span></div>
            <div>LNG: <span id="lon">0.00</span></div>
            <div>SPD: <span id="spd">0</span> km/h</div>
            <div>ACC: <span id="acc">0</span>m</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("btnTrack").onclick = async function() {
        const nama = document.getElementById("nama").value;
        if(!nama) return alert("Callsign required!");

        document.getElementById("msg").innerHTML = '<span class="status-on">●</span> TRANSMITTING...';
        
        if ("wakeLock" in navigator) {
            try { await navigator.wakeLock.request("screen"); } catch (err) {}
        }

        navigator.geolocation.watchPosition((pos) => {
            const updates = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                speed: Math.round((pos.coords.speed || 0) * 3.6),
                accuracy: Math.round(pos.coords.accuracy),
                waktu: Date.now(),
                status: "ONLINE"
            };

            set(ref(db, "live/" + nama), updates)
                .catch(e => { document.getElementById("msg").innerText = "FIREBASE ERROR: CHECK RULES"; });

            // Set offline auto saat tab ditutup
            onDisconnect(ref(db, "live/" + nama + "/status")).set("OFFLINE");

            document.getElementById("lat").innerText = updates.latitude.toFixed(4);
            document.getElementById("lon").innerText = updates.longitude.toFixed(4);
            document.getElementById("spd").innerText = updates.speed;
            document.getElementById("acc").innerText = updates.accuracy;
        }, (err) => {
            document.getElementById("msg").innerText = "GPS PERMISSION DENIED";
        }, { enableHighAccuracy: true });
    };
</script>
</body>
</html>
