<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT MONITORING - TACTICAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Orbitron', sans-serif;
            background: #020502; color: #00ff00; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Scanline CRT Effect */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .header {
            background: #051a05; padding: 15px; text-align: center;
            border-bottom: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            font-weight: bold; letter-spacing: 3px; z-index: 5;
        }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; z-index: 5; }

        .card {
            background: rgba(10, 20, 10, 0.9); padding: 30px; width: 320px;
            border: 1px solid #00ff00; border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); position: relative;
        }

        h2 { text-align: center; font-size: 16px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }

        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #00ff00;
            color: #00ff00; font-family: 'Orbitron'; margin-bottom: 15px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; background: #00ff00; color: #000;
            border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #008800; box-shadow: 0 0 20px #00ff00; }

        .telemetry-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 20px; border-top: 1px solid rgba(0, 255, 0, 0.3); padding-top: 15px;
        }

        .tel-item { font-size: 10px; color: #7cfc00; }
        .tel-val { color: #fff; display: block; font-size: 12px; }

        .status-pulse {
            display: inline-block; width: 10px; height: 10px;
            background: #00ff00; border-radius: 50%; margin-right: 5px;
            box-shadow: 0 0 10px #00ff00; animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .footer { padding: 10px; text-align: center; font-size: 9px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">SISTEM MONITORING TAKTIS YONIF 859</div>

<div class="container">
    <div class="card">
        <h2>IDENTIFIKASI UNIT</h2>
        <input type="text" id="nama" placeholder="CALLSIGN / NAMA">
        <button onclick="mulaiTracking()">AKTIFKAN TRANSMISI</button>
        
        <div id="status-text" style="text-align:center; margin-top:15px; font-size:12px;">STANDBY</div>

        <div class="telemetry-grid">
            <div class="tel-item">LATITUDE<span class="tel-val" id="val-lat">0.00000</span></div>
            <div class="tel-item">LONGITUDE<span class="tel-val" id="val-lon">0.00000</span></div>
            <div class="tel-item">SPEED<span class="tel-val" id="val-spd">0 km/h</span></div>
            <div class="tel-item">ACCURACY<span class="tel-val" id="val-acc">0 m</span></div>
        </div>
    </div>
</div>

<div class="footer">SECURE ENCRYPTED CHANNEL // MIL-STD-810G</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let wakeLock = null;

    window.mulaiTracking = async function() {
        const nama = document.getElementById("nama").value;
        if(!nama) { alert("Input Callsign!"); return; }

        try { wakeLock = await navigator.wakeLock.request("screen"); } catch(e) {}

        document.getElementById("status-text").innerHTML = `<span class="status-pulse"></span> TRANSMITTING...`;

        navigator.geolocation.watchPosition((pos) => {
            const data = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                speed: Math.round((pos.coords.speed || 0) * 3.6),
                accuracy: Math.round(pos.coords.accuracy),
                waktu: Date.now(),
                status: "ONLINE"
            };

            set(ref(db, "live/" + nama), data);

            // Update UI
            document.getElementById("val-lat").innerText = data.latitude.toFixed(5);
            document.getElementById("val-lon").innerText = data.longitude.toFixed(5);
            document.getElementById("val-spd").innerText = data.speed + " km/h";
            document.getElementById("val-acc").innerText = data.accuracy + " m";
        }, (err) => { alert("GPS Error: " + err.message); }, { enableHighAccuracy: true });
    };
</script>
</body>
</html>
