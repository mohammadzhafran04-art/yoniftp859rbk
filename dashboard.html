<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQ - COMMAND CENTER v12.5 (PRO-TACTICAL)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        :root { 
            --neon-green: #00ff00; 
            --neon-blue: #00f2ff; 
            --danger: #ff1144; 
            --dark-panel: rgba(0, 15, 0, 0.85);
            --glass-border: rgba(0, 255, 0, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Orbitron', sans-serif; 
            background: #000; color: var(--neon-green); 
            overflow: hidden; height: 100vh;
        }

        /* --- TAMPILAN LOGIN RAHASIA (CYBER-ROTATING BORDER) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000000; display: flex; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* Watermark Background */
        #login-overlay::after {
            content: "TOP SECRET // CLASSIFIED // TOP SECRET // CLASSIFIED // TOP SECRET // CLASSIFIED";
            position: absolute; font-size: 8rem; font-weight: 900;
            color: rgba(0, 255, 0, 0.03); transform: rotate(-25deg);
            white-space: nowrap; pointer-events: none; width: 200%;
            animation: scroll-text 20s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: rotate(-25deg) translateX(0); }
            100% { transform: rotate(-25deg) translateX(-50%); }
        }

        /* Container Kotak dengan Border Berputar */
        .login-card-wrapper {
            position: relative;
            width: 400px;
            padding: 3px; /* Ketebalan border berputar */
            background: linear-gradient(0deg, transparent, var(--neon-green), transparent);
            overflow: hidden;
            border-radius: 10px;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.1);
        }

        /* Animasi Putaran Border */
        .login-card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 400px;
            height: 600px;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-green));
            animation: rotate-border 4s linear infinite;
            transform-origin: bottom right;
        }

        .login-card-wrapper::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 400px;
            height: 600px;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-blue));
            animation: rotate-border 4s linear infinite;
            animation-delay: -2s;
            transform-origin: bottom right;
        }

        @keyframes rotate-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-box {
            position: relative;
            width: 100%;
            background: #000;
            padding: 40px 30px;
            border-radius: 8px;
            z-index: 11;
            box-sizing: border-box;
            text-align: center;
        }

        /* Aksen Siku Taktis */
        .login-box-brackets::before, .login-box-brackets::after {
            content: ""; position: absolute; width: 20px; height: 20px; z-index: 12;
        }
        .login-box-brackets::before { top: 10px; left: 10px; border-top: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); }
        .login-box-brackets::after { bottom: 10px; right: 10px; border-bottom: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green); }

        .login-input {
            width: 100%; background: rgba(0, 40, 0, 0.4); border: 1px solid rgba(0, 255, 0, 0.3);
            color: var(--neon-green); padding: 18px; margin: 30px 0 15px 0;
            font-family: 'JetBrains Mono'; text-align: center; font-size: 1.2rem;
            letter-spacing: 8px; outline: none; box-sizing: border-box; transition: 0.3s;
            position: relative; z-index: 15;
        }
        .login-input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0,255,0,0.2); }

        .btn-access {
            width: 100%; background: var(--neon-green); color: #000;
            border: none; padding: 18px; font-family: 'Orbitron';
            font-weight: 900; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
            position: relative; z-index: 15;
        }
        .btn-access:hover { background: #fff; box-shadow: 0 0 30px var(--neon-green); }

        /* PERGERAKAN MULUS MARKER */
        .leaflet-marker-icon { 
            transition: transform 1.5s linear !important; 
            filter: drop-shadow(0 0 5px var(--neon-green)); 
        }
        .leaflet-marker-shadow { display: none !important; }

        /* Global HUD FX */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 9999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        @keyframes global-emergency {
            0%, 100% { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0); }
            50% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.3); }
        }
        .emergency-mode { animation: global-emergency 1.5s infinite !important; }

        .header { 
            background: rgba(0,0,0,0.95); height: 65px; padding: 0 30px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-green); z-index: 1000; position: relative;
        }

        .main-container { display: grid; grid-template-columns: 360px 1fr 360px; height: calc(100vh - 67px); }
        .panel { background: var(--dark-panel); padding: 25px; overflow-y: auto; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        #map { height: 100%; width: 100%; background: #050505 !important; }

        .unit-card { 
            padding: 18px; border: 1px solid rgba(0,255,0,0.15); 
            margin-bottom: 15px; background: rgba(0,30,0,0.4); 
            border-radius: 4px; cursor: pointer; transition: 0.3s;
            border-left: 5px solid transparent;
        }
        .unit-card:hover { transform: scale(1.02); background: rgba(0,50,0,0.5); }
        .card-sos { animation: sos-card-pulse 0.6s infinite !important; border-left-color: var(--danger) !important; }
        @keyframes sos-card-pulse { 0%, 100% { background: rgba(255,0,0,0.1); } 50% { background: rgba(255,0,0,0.4); } }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 11px; font-family: 'JetBrains Mono'; margin-bottom: 6px; }
        .unit-label { background: #000; color: #fff; border: 1px solid var(--neon-green); padding: 3px 12px; font-size: 10px; border-radius: 2px; font-family: 'JetBrains Mono'; }
        .unit-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; position: relative; }
        .sos-active-dot { background: var(--danger) !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #auth-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000001; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body id="main-body">

<!-- LOGIN SYSTEM OVERLAY -->
<div id="login-overlay">
    <div class="login-card-wrapper">
        <div class="login-box">
            <div class="login-box-brackets"></div>
            <div style="font-size: 9px; color: var(--neon-green); margin-bottom: 10px; text-align: left; font-family: 'JetBrains Mono'; opacity: 0.6;">
                > ACCESS_NODE: HQ_COMMAND<br>
                > ENCRYPTION: SECURE_AES
            </div>
            <h2 style="color:#fff; letter-spacing: 5px; margin: 0; font-size: 1.4rem; text-shadow: 0 0 10px var(--neon-green);">ADMIN ACCESS</h2>
            <input type="password" id="admin-pass" class="login-input" placeholder="••••••••">
            <div id="login-status" style="font-size: 9px; color: var(--neon-blue); margin-bottom: 15px; height: 15px; font-family: 'JetBrains Mono';"></div>
            <button class="btn-access" onclick="checkAccess()">AUTHORIZE</button>
            <div style="margin-top: 25px; border-top: 1px solid rgba(0,255,0,0.1); padding-top: 15px;">
                <span style="font-size: 10px; color: rgba(255,255,255,0.3);">ESTABLISHING SECURE CONNECTION...</span>
            </div>
        </div>
    </div>
</div>

<audio id="sos-alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3" preload="auto" loop></audio>

<div id="auth-loader" style="display:none;">
    <div style="width: 60px; height: 60px; border: 4px solid var(--neon-green); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
    <h3 style="color:var(--neon-green); margin-top: 25px; letter-spacing: 8px; font-weight: 300;">DECRYPTING_GRID_DATA...</h3>
</div>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<div class="header">
    <div style="font-weight: 900; letter-spacing: 5px;">🛰 TAC-COMMAND <span style="color: var(--neon-blue);">v12.5</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 26px; color: #fff; letter-spacing: 3px;">00:00:00</div>
    <div style="font-size: 10px; text-align: right; line-height: 1.4;">
        LINK: <span style="color:var(--neon-blue)">ENCRYPTED</span><br>
        <span id="sos-global-label" style="color:var(--danger); font-weight:bold;"></span>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <button style="width:100%; background:transparent; border:1px solid var(--danger); color:var(--danger); padding:12px; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin-bottom:20px;" onclick="killAllUnits()">TERMINATE GRID ASSETS</button>
        <div style="border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; margin-bottom: 20px;">
            <span style="font-size: 12px; color: var(--neon-blue); font-weight: bold; letter-spacing: 3px;">[ ACTIVE_ASSETS ]</span>
        </div>
        <div id="unit-list"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <div style="border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; margin-bottom: 20px;">
            <span style="font-size: 12px; color: var(--neon-blue); font-weight: bold; letter-spacing: 3px;">[ ASSET_INTEL ]</span>
        </div>
        <div id="detail-box" style="background: rgba(0,0,0,0.6); border: 1px solid rgba(0,242,255,0.2); padding: 20px; border-radius: 2px; min-height: 100px;">
            <span style="color: rgba(0,255,0,0.4); font-size: 12px; font-family: 'JetBrains Mono';">AWAITING_UPLINK_SIGNAL...</span>
        </div>
        
        <div id="comm-panel" style="display:none; margin-top:25px;">
            <div style="font-size: 10px; color: var(--neon-blue); margin-bottom: 10px; font-family: 'JetBrains Mono';">> DIRECT_UPLINK_READY</div>
            <input type="text" id="msgText" placeholder="TYPE_COMMAND_HERE..." style="width: 100%; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 12px; font-family: 'JetBrains Mono'; outline: none;">
            <button id="btnSend" style="width: 100%; background: var(--neon-blue); border: none; padding: 15px; margin-top: 10px; color: #000; font-family: 'Orbitron'; font-weight: 900; cursor: pointer;">EXECUTE</button>
        </div>

        <div style="margin-top:auto; padding-top: 30px;">
            <span style="font-size: 10px; color: var(--neon-blue); font-weight: bold; letter-spacing: 2px;">[ SAT_VISUAL_LINK ]</span>
            <div id="v-feed" style="height:210px; border:1px solid #333; margin-top:15px; background: #000; display:none;">
                <iframe id="sat-view" style="width:100%; height:100%; border:none; filter: contrast(1.2) brightness(0.8) sepia(0.2) hue-rotate(80deg);"></iframe>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let map, markers = {}, selectedId = null;

    // --- SECURITY SYSTEM ---
    const PASS_KEY = "859-COMMAND";
    
    window.checkAccess = function() {
        const input = document.getElementById("admin-pass").value;
        const status = document.getElementById("login-status");
        status.innerText = "VERIFYING IDENTITY...";
        
        setTimeout(() => {
            if(input === PASS_KEY) {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("auth-loader").style.display = "flex";
                setTimeout(() => {
                    document.getElementById("auth-loader").style.display = "none";
                }, 2000);
            } else {
                status.innerText = "ACCESS_DENIED: UNAUTHORIZED_KEY";
                status.style.color = "var(--danger)";
                document.getElementById("admin-pass").value = "";
            }
        }, 1000);
    };

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            document.getElementById("admin-pass").value = "";
            document.getElementById("login-overlay").style.display = "flex";
            document.getElementById("login-status").innerText = "SYSTEM RE-LOCKED DUE TO INACTIVITY";
            document.getElementById("login-status").style.color = "var(--neon-blue)";
        }
    });

    // --- CORE SYSTEM ---
    setInterval(() => { 
        document.getElementById("clock").innerText = new Date().toLocaleTimeString('id-ID', { hour12: false }); 
    }, 1000);
    
    map = L.map('map', { center: [-0.73, 135.74], zoom: 14, zoomControl: false });
    L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains: ['mt0','mt1','mt2','mt3'] }).addTo(map);

    onValue(ref(db, "live"), snap => {
        const data = snap.val() || {};
        const list = document.getElementById("unit-list");
        const body = document.getElementById("main-body");
        list.innerHTML = "";
        let sosCount = 0;

        Object.keys(markers).forEach(id => {
            if(!data[id]) { map.removeLayer(markers[id]); delete markers[id]; }
        });

        Object.keys(data).forEach(id => {
            const unit = data[id];
            const diff = Date.now() - unit.ts;
            const isSOS = unit.sos === true || unit.status === "SOS_ACTIVE" || unit.status === "SOS_ACTIVATED";
            const isLag = diff >= 25000;
            
            if(isSOS) sosCount++;
            let statusColor = isSOS ? "#ff1144" : (isLag ? "#ffff00" : "#00ff00");
            let statusText = isSOS ? "EMERGENCY" : (isLag ? "LOST_SYNC" : "ACTIVE");

            if (unit.latitude) {
                const iconHtml = `<div style="position:relative;"><div class="unit-label">${id}</div><div class="unit-dot ${isSOS ? 'sos-active-dot' : ''}" style="background:${statusColor}; box-shadow: 0 0 15px ${statusColor}"></div></div>`;
                const customIcon = L.divIcon({ className: 'custom-icon', html: iconHtml, iconSize: [14, 14], iconAnchor: [7, 7] });

                if(!markers[id]) {
                    markers[id] = L.marker([unit.latitude, unit.longitude], { icon: customIcon }).addTo(map);
                    markers[id].on('click', () => selectUnit(id, unit));
                } else {
                    markers[id].setLatLng([unit.latitude, unit.longitude]);
                    markers[id].setIcon(customIcon);
                }
            }

            const card = document.createElement("div");
            card.className = `unit-card ${selectedId === id ? 'card-active' : ''} ${isSOS ? 'card-sos' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-weight:900; font-size:12px; color:#fff;">${id}</span>
                    <button style="background:none; border:1px solid var(--danger); color:var(--danger); font-size:9px; padding:3px 7px; cursor:pointer;" onclick="event.stopPropagation(); remoteKill('${id}')">WIPE</button>
                </div>
                <div class="stat-row"><span>STATUS</span><span style="color:${statusColor}">${statusText}</span></div>
                <div class="stat-row"><span>ENERGY</span><span style="color:#fff">${unit.battery}%</span></div>
            `;
            card.onclick = () => selectUnit(id, unit);
            list.appendChild(card);
        });

        if(sosCount > 0) {
            body.classList.add("emergency-mode");
            document.getElementById("sos-alarm").play();
            document.getElementById("sos-global-label").innerText = `⚠️ ${sosCount} SOS_ALERT`;
        } else {
            body.classList.remove("emergency-mode");
            document.getElementById("sos-alarm").pause();
            document.getElementById("sos-global-label").innerText = "";
        }
    });

    window.killAllUnits = function() { if(confirm("TERMINATE GRID?")) remove(ref(db, "live")); };
    window.remoteKill = function(id) { if(confirm(`WIPE NODE: ${id}?`)) remove(ref(db, `live/${id}`)); };

    function selectUnit(id, unit) {
        selectedId = id;
        map.flyTo([unit.latitude, unit.longitude], 18);
        document.getElementById("comm-panel").style.display = "block";
        document.getElementById("v-feed").style.display = "block";
        document.getElementById("sat-view").src = `https://maps.google.com/maps?q=${unit.latitude},${unit.longitude}&t=k&z=19&output=embed`;
        document.getElementById("detail-box").innerHTML = `
            <div style="color:var(--neon-blue); font-weight:900; border-bottom:1px solid #333; margin-bottom:10px; padding-bottom:5px;">${id}</div>
            <div class="stat-row"><span>COORD</span><span style="color:#fff">${unit.latitude.toFixed(6)}, ${unit.longitude.toFixed(6)}</span></div>
            <div class="stat-row"><span>SPD</span><span style="color:#fff">${unit.speed || 0} KM/H</span></div>
            <div class="stat-row"><span>SYNC</span><span style="color:#fff">${new Date(unit.ts).toLocaleTimeString()}</span></div>
        `;
    }

    document.getElementById("btnSend").onclick = () => {
        const txt = document.getElementById("msgText").value;
        if(!selectedId || !txt) return;
        set(ref(db, `live/${selectedId}/command_msg`), { text: txt.toUpperCase(), ts: Date.now() });
        document.getElementById("msgText").value = "";
    };
</script>
</body>
</html>
