<!DOCTYPE html>
<html lang="id">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT MONITORING - TACTICAL V7.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00ff00; --dark-bg: #000800; --glass-bg: rgba(5, 15, 5, 0.9); --danger: #ff0033; --cyan: #00f2ff; --warning: #ffcc00; }
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: var(--dark-bg); color: var(--neon-green); overflow: hidden; height: 100vh; display: flex; flex-direction: column; user-select: none; transition: filter 0.3s; }
        
        /* Grid & Background */
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; transform: perspective(500px) rotateX(60deg); transform-origin: center top; animation: moveGrid 10s linear infinite; }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 300px; } }

        .header { background: rgba(2, 18, 2, 0.95); padding: 12px; text-align: center; border-bottom: 2px solid var(--neon-green); letter-spacing: 4px; z-index: 50; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3); }
        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; padding: 15px; }

        /* Compass */
        #compass { width: 100px; height: 100px; border: 2px solid var(--neon-green); border-radius: 50%; margin-bottom: 15px; position: relative; background: radial-gradient(circle, rgba(0,255,0,0.1) 0%, transparent 70%); transition: transform 0.1s linear; }
        .needle { position: absolute; top: 50%; left: 50%; width: 2px; height: 40px; background: var(--cyan); transform-origin: bottom; transform: translate(-50%, -100%); box-shadow: 0 0 10px var(--cyan); }

        /* Card & Input */
        .card { background: var(--glass-bg); padding: 20px; width: 100%; max-width: 350px; border: 1px solid var(--neon-green); border-radius: 10px; backdrop-filter: blur(10px); position: relative; box-sizing: border-box; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); font-family: 'JetBrains Mono'; margin-bottom: 10px; box-sizing: border-box; text-align: center; outline: none; }
        input:disabled { opacity: 0.5; border-color: #333; }

        /* Buttons */
        button { width: 100%; padding: 16px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); margin-bottom: 5px; transition: 0.2s; }
        #btnTrack { background: var(--neon-green); color: #000; }
        #btnSOS { background: var(--danger); color: #fff; display: none; animation: pulse 1.5s infinite; }
        #btnTerminate { background: transparent; color: var(--danger); border: 1px solid var(--danger); display: none; font-size: 10px; padding: 8px; margin-top: 10px; }

        /* Telemetry */
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; font-family: 'JetBrains Mono'; }
        .tel-box { background: rgba(0,0,0,0.7); padding: 8px; border: 1px solid rgba(0, 255, 0, 0.2); }
        .tel-label { font-size: 8px; color: var(--cyan); display: block; }
        .tel-val { font-size: 14px; font-weight: bold; color: #fff; }

        /* Utils */
        #loader { display: none; width: 20px; height: 20px; border: 2px solid var(--neon-green); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #status-msg { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 100; display: none; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { top: 0; opacity: 0; } to { top: 80px; opacity: 1; } }

        .ping { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; display: inline-block; opacity: 0; vertical-align: middle; }
        .ping.active { animation: blink 0.5s; }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
        .emergency-mode { filter: sepia(1) saturate(4) hue-rotate(-50deg); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div id="status-msg"></div>

<div class="header">
    <span style="font-size: 10px;">TAC-UNIT</span>
    <div><div id="hb" class="ping"></div> <span>TACTICAL_V7.1</span></div>
    <span id="pwr">--%</span>
</div>

<div class="container">
    <div id="compass"><div class="needle"></div></div>
    <div class="card">
        <input type="text" id="nama" placeholder="CALLSIGN_ID" maxlength="12" spellcheck="false">
        
        <div id="loader"></div>
        
        <button id="btnTrack">Initiate Uplink</button>
        <button id="btnSOS">SEND SOS BEACON</button>
        <button id="btnTerminate">Terminate Connection</button>

        <div class="telemetry">
            <div class="tel-box"><span class="tel-label">LAT</span><span class="tel-val" id="lat">0.0000</span></div>
            <div class="tel-box"><span class="tel-label">LON</span><span class="tel-val" id="lon">0.0000</span></div>
            <div class="tel-box"><span class="tel-label">SPEED</span><span class="tel-val" id="spd">0 kmh</span></div>
            <div class="tel-box"><span class="tel-label">ACCURACY</span><span class="tel-val" id="acc">0 m</span></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMzKg8T_1hKAukXu9GfEg0S22U9pY0ZDs",
        authDomain: "database-baru-rbk.firebaseapp.com",
        databaseURL: "https://database-baru-rbk-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "database-baru-rbk",
        storageBucket: "database-baru-rbk.firebasestorage.app",
        messagingSenderId: "419838977211",
        appId: "1:419838977211:web:2c6af76dab5cf21915f59e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let isSOS = false;
    let currentCallsign = "";
    let watchId = null;
    let wakeLock = null;

    // REGISTER SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        });
    }

    // WAKE LOCK: Mencegah HP Tidur
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log("Wake Lock Aktif - CPU Terjaga");
            }
        } catch (err) {
            console.log("WakeLock gagal: " + err.message);
        }
    }

    // UI Helper: Notify
    function showNotify(text, type) {
        const msg = document.getElementById("status-msg");
        msg.innerText = text;
        msg.style.display = "block";
        msg.style.background = type === 'success' ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 0, 51, 0.8)';
        msg.style.color = type === 'success' ? '#000' : '#fff';
        setTimeout(() => msg.style.display = "none", 3000);
    }

    // Battery Logic
    if (navigator.getBattery) {
        navigator.getBattery().then(b => {
            const up = () => document.getElementById("pwr").innerText = Math.round(b.level * 100) + "%";
            up(); b.onlevelchange = up;
        });
    }

    // Compass
    window.addEventListener("deviceorientation", (e) => {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        if (heading) document.getElementById("compass").style.transform = `rotate(${-heading}deg)`;
    });

    // Start Tracking
    document.getElementById("btnTrack").onclick = function() {
        const callsign = document.getElementById("nama").value.trim().toUpperCase();
        if(!callsign) {
            showNotify("REQUIRED: CALLSIGN ID", "error");
            return;
        }

        requestWakeLock(); // Aktifkan Wake Lock saat mulai tracking

        this.style.display = "none";
        document.getElementById("loader").style.display = "block";
        document.getElementById("nama").disabled = true;

        currentCallsign = callsign;

        // Watch Position dengan High Accuracy
        watchId = navigator.geolocation.watchPosition((pos) => {
            const data = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                speed: Math.round((pos.coords.speed || 0) * 3.6),
                accuracy: Math.round(pos.coords.accuracy),
                ts: Date.now(),
                status: isSOS ? "EMERGENCY" : "ACTIVE"
            };

            set(ref(db, "live/" + currentCallsign), data)
                .then(() => {
                    if(document.getElementById("loader").style.display === "block") {
                        document.getElementById("loader").style.display = "none";
                        document.getElementById("btnSOS").style.display = "block";
                        document.getElementById("btnTerminate").style.display = "block";
                        showNotify("UPLINK SUCCESSFUL", "success");
                    }
                });

            onDisconnect(ref(db, "live/" + currentCallsign)).remove();

            document.getElementById("lat").innerText = data.latitude.toFixed(4);
            document.getElementById("lon").innerText = data.longitude.toFixed(4);
            document.getElementById("spd").innerText = data.speed + " kmh";
            document.getElementById("acc").innerText = data.accuracy + " m";
            
            const hb = document.getElementById("hb");
            hb.classList.add("active"); setTimeout(() => hb.classList.remove("active"), 400);

        }, (err) => {
            showNotify("GPS ERROR: " + err.message, "error");
        }, { 
            enableHighAccuracy: true, 
            timeout: 10000, 
            maximumAge: 0 
        });
    };

    // SOS Toggle
    document.getElementById("btnSOS").onclick = function() {
        isSOS = !isSOS;
        document.body.classList.toggle("emergency-mode");
        this.innerText = isSOS ? "CANCEL SOS" : "SEND SOS BEACON";
        
        if (currentCallsign) {
            update(ref(db, "live/" + currentCallsign), { 
                status: isSOS ? "EMERGENCY" : "ACTIVE",
                ts: Date.now() 
            });
        }
    };

    // Terminate Connection
    document.getElementById("btnTerminate").onclick = async function() {
        if(confirm("TERMINATE ALL UPLINKS?")) {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (wakeLock) wakeLock.release();
            if (currentCallsign) await remove(ref(db, "live/" + currentCallsign));
            location.reload();
        }
    };
</script>
</body>
</html>
